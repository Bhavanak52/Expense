version: '3.8'

services:
  backend:
    image: bhavanakajampady/expense-backend:latest
    container_name: expense-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    networks:
      - expense-net

  frontend:
    image: bhavanakajampady/expense-frontend:latest
    container_name: expense-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - expense-net

  mongo:
    image: mongo:latest
    container_name: expense-mongo
    ports:
     
    networks:
      - expense-net
    volumes:
      - mongo-data:/data/db

networks:
  expense-net:

volumes:
  mongo-data:
